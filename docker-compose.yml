version: "3.9"

services:
  backend:
    build:
      context: ./backend
    environment:
      FIRESTORE_COLLECTION: items
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend
    ports:
      - "8081:8080"
